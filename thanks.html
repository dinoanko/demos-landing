<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>접수되었습니다 · Demos</title>
<style>
@font-face{font-family:'KJC Myungjo';src:url('assets/fonts/KimjungchulMyungjo-Bold.ttf') format('truetype');font-weight:700}
body{margin:0;height:100vh;display:grid;place-items:center;background:#0b0b0c;color:#F3F5F7;
 font-family:'Wanted Sans','Malgun Gothic',sans-serif;text-align:center}
.b{max-width:440px;padding:0 24px}
.m{width:56px;height:56px;border-radius:50%;background:rgba(14,206,221,.12);border:1px solid #0ECEDD;

h1{font-family:'KJC Myungjo',serif;font-size:26px;margin:0 0 12px}
p{color:#93A0AA;font-size:15px;line-height:1.7}
a{display:inline-block;margin-top:26px;color:#0b0b0c;background:#0ECEDD;font-weight:800;
 text-decoration:none;padding:12px 22px;border-radius:10px}
</style></head><body><div class="b">
<div class="m">&#10003;</div>
<h1>문의가 접수되었습니다</h1>
<p>검토 후 남겨 주신 이메일로 회신드리겠습니다.<br>데모 신청은 48시간 내 검토 가능 여부를 회신합니다.</p>
